<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking – Landing</title>

    <style>
        /* ===== GLOBAL ===== */
        body {
            margin: 0;
            overflow-x: hidden;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(to top, #e6fffa, #c3fae8);
        }

        /* ===== TEXT ===== */
        .hero {
            position: absolute;
            top: 18%;
            width: 100%;
            text-align: center;
            color: #065f46;
            z-index: 10;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 30px;
        }

        /* Button */
        .btn-start {
            display: inline-block;
            padding: 12px 30px;
            background: #059669;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            background: #047857;
        }

        /* ===== ROAD ===== */
        .road {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 160px;
            background: #3f3f46;
            border-top: 10px solid #52525b;
        }

        .lane {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 6px;
            background: repeating-linear-gradient(to right,
                    #fff 0px,
                    #fff 50px,
                    transparent 50px,
                    transparent 100px);
            animation: laneMove 1s linear infinite;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        @keyframes laneMove {
            from {
                background-position: 0;
            }

            to {
                background-position: 120px;
            }
        }

        /* ===== CAR ===== */
        .car {
            position: absolute;
            bottom: 45px;
            left: -300px;
            width: 300px;
            /* Adjusted width for the SVG */
            height: auto;
            animation: drive 7s linear infinite;
            z-index: 5;
        }

        /* Drive animation */
        @keyframes drive {
            from {
                left: -300px;
            }

            to {
                left: 110%;
            }
        }
    </style>
</head>

<body>

    <!-- TEXT -->
    <div class="hero">
        <h1>Welcome to P4 Park</h1>
        <p>Real-time parking availability & intelligent slot management</p>
        <a href="login.html" class="btn-start">Get Started</a>
    </div>

    <!-- ROAD -->
    <div class="road">
        <div class="lane"></div>
    </div>

    <!-- CAR -->
    <img src="images/car.svg" class="car" alt="Car">

</body>

</html>
